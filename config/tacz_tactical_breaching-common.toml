[hp]
	#Default HP for wooden doors.
	# Default: 24.0
	# Range: 1.0 ~ 100000.0
	wooden_door_hp = 24.0
	#Default HP for wooden trapdoors.
	# Default: 16.0
	# Range: 1.0 ~ 100000.0
	wooden_trapdoor_hp = 16.0
	#Default HP for iron doors.
	# Default: 140.0
	# Range: 1.0 ~ 100000.0
	iron_door_hp = 140.0
	#Default HP for iron trapdoors.
	# Default: 100.0
	# Range: 1.0 ~ 100000.0
	iron_trapdoor_hp = 100.0
	#Default HP for full glass blocks and stained glass blocks.
	# Default: 16.0
	# Range: 1.0 ~ 100000.0
	glass_block_hp = 16.0
	#Default HP for glass panes and stained glass panes.
	# Default: 8.0
	# Range: 1.0 ~ 100000.0
	glass_pane_hp = 8.0
	#Default HP for tinted glass.
	# Default: 24.0
	# Range: 1.0 ~ 100000.0
	tinted_glass_hp = 24.0
	#Default HP for modded glass door-like blocks.
	# Default: 18.0
	# Range: 1.0 ~ 100000.0
	glass_door_hp = 18.0
	#Default HP for supported blocks that are not wood, iron, or glass.
	# Default: 40.0
	# Range: 1.0 ~ 100000.0
	other_supported_block_hp = 40.0
	#Per-block or per-tag HP overrides. Format: 'namespace:block=hp' or '#namespace:tag=hp'. Earlier entries win.
	block_hp_overrides = ["#minecraft:wooden_doors=24", "#minecraft:wooden_trapdoors=16", "minecraft:iron_door=140", "minecraft:iron_trapdoor=100", "minecraft:glass=16", "minecraft:glass_pane=8", "minecraft:tinted_glass=24"]

[damage]
	#Global multiplier applied after TaCZ bullet damage is calculated.
	# Default: 1.0
	# Range: 0.0 ~ 1000.0
	damage_multiplier = 1.0
	#Optional per-TaCZ-gun multipliers. Format: 'namespace:gun_id=multiplier'.
	gun_damage_multipliers = ["tacz:m107=1.45", "tacz:m95=1.45", "tacz:rpg7=4.0"]
	#Optional per-TaCZ-ammo/caliber multipliers. Format: 'namespace:ammo_id=multiplier'.
	ammo_damage_multipliers = ["tacz:12g=1.15", "tacz:50bmg=1.5"]
	#Distance in blocks where shotguns receive extra block damage.
	# Default: 7.0
	# Range: 0.0 ~ 256.0
	shotgun_close_range = 7.0
	#Extra multiplier for shotgun hits inside shotgun_close_range.
	# Default: 1.35
	# Range: 0.0 ~ 100.0
	shotgun_close_range_multiplier = 1.35
	#When true, bullets keep flying after hitting glass targets.
	glass_passthrough_enabled = true
	#Cumulative damage multiplier applied to a bullet each time it passes through glass.
	# Default: 0.65
	# Range: 0.0 ~ 1.0
	glass_passthrough_damage_multiplier = 0.65

[rules]
	#When true, only blocks in block_whitelist can be damaged.
	use_whitelist = false
	#Blocks/tags that may be damaged when use_whitelist is true. Format: 'namespace:block' or '#namespace:tag'.
	block_whitelist = []
	#Blocks/tags that can never be damaged. Format: 'namespace:block' or '#namespace:tag'.
	block_blacklist = []
	#Whether blocks broken by bullets drop their normal item drops.
	drop_items = true
	#Ticks after the last hit before stored damage is forgotten.
	# Default: 400
	# Range: 20 ~ 72000
	damage_timeout_ticks = 400
	#Show vanilla crack progress while a block has stored damage.
	show_crack_progress = true
	#Spawn block particles when a supported block is hit.
	show_impact_particles = true
	#Play the target block's hit sound when it is damaged.
	play_impact_sound = true

[shell_casings]
	#Spawn visual shell casings when TaCZ guns fire.
	enableShellCasings = true
	#How long shell casings remain in ticks. 20 ticks = 1 second.
	# Default: 160
	# Range: 20 ~ 2400
	casingLifetime = 160
	#If true, casings that have landed and stopped moving stay on the ground until removed with a command or by unloading rules.
	persistentSettledCasings = true
	#Maximum casings allowed near a shooter before new casings are skipped.
	# Default: 80
	# Range: 0 ~ 1000
	maxNearbyCasings = 80
	#Play small metal impact sounds when casings hit blocks.
	enableCasingSounds = true

[dropped_magazines]
	#Drop a physical magazine entity when a TaCZ magazine-fed weapon reloads normally.
	dropMagazines = true
	#Allow players to pick dropped magazines back up.
	allowPickup = true
	#Preserve remaining rounds in dropped magazines and picked-up magazine items.
	preserveAmmo = true
	#When true, Shift + Reload stores the old magazine in inventory instead of dropping it.
	enableTacticalReload = true
	#How long dropped magazines remain in the world, in seconds.
	# Default: 300
	# Range: 5 ~ 3600
	despawnTimeSeconds = 300
	#Makes weapons require loaded magazines instead of loose ammo.
	forceMagazineReloading = true
	#Allows normal TaCZ ammo reloads. Ignored when forceMagazineReloading is true.
	allowLooseAmmoReloading = false
	#Allows the custom loaded magazine system.
	allowMagazineReloading = true

[impact_smoke]
	#Spawn subtle client-side smoke puffs when TaCZ bullets hit blocks.
	enableImpactSmoke = true
	#Base smoke particles per impact.
	# Default: 6
	# Range: 0 ~ 64
	impactSmokeAmount = 6
	#Visual scale for impact smoke particles.
	# Default: 0.35
	# Range: 0.05 ~ 2.0
	impactSmokeSize = 0.35
	#Smoke lifetime in client ticks.
	# Default: 12
	# Range: 1 ~ 80
	impactSmokeLifetimeTicks = 12
	#When true, smoke only appears on stone/concrete/metal and other hard blocks.
	impactSmokeOnlyOnHardBlocks = false
	#Client-side limiter for impact smoke/dust particles.
	# Default: 180
	# Range: 0 ~ 2000
	maxImpactParticlesPerSecond = 180

[metal_impacts]
	#Spawn bright directional sparks when TaCZ bullets hit metal blocks.
	enableMetalSparks = true
	#Spark particles per metal impact.
	# Default: 8
	# Range: 0 ~ 64
	metalSparkAmount = 8
	#Lifetime for metal spark particles in client ticks.
	# Default: 6
	# Range: 1 ~ 40
	metalSparkLifetimeTicks = 6
	#Play a small metallic ricochet/ping sound on metal impacts.
	enableMetalRicochetSound = true

[wood_impacts]
	#Spawn directional wood splinters when TaCZ bullets hit wooden blocks.
	enableWoodSplinters = true
	#Wood splinter particles per wooden impact. Shotguns and high calibers scale this up.
	# Default: 10
	# Range: 0 ~ 96
	woodSplinterAmount = 10
	#Lifetime for wood splinter particles in client ticks.
	# Default: 14
	# Range: 1 ~ 80
	woodSplinterLifetimeTicks = 14
	#Play a sharp wooden crack/splinter sound on wood impacts.
	enableWoodImpactSound = true

[bullet_decals]
	#Render persistent client-side bullet hole decals at TaCZ impact positions.
	enableBulletDecals = true
	#Maximum client-side bullet decals stored per chunk. Oldest decals are removed first.
	# Default: 100
	# Range: 0 ~ 1000
	maxDecalsPerChunk = 100
	#How long bullet decals remain visible on clients, in seconds.
	# Default: 300
	# Range: 1 ~ 3600
	bulletDecalLifetimeSeconds = 300
	#Base visual size for bullet decals, in blocks.
	# Default: 0.22
	# Range: 0.03 ~ 2.0
	bulletDecalSize = 0.22
	#Use material-specific decal colors and crack/chip styles.
	enableMaterialSpecificDecals = true

[ricochet_sounds]
	#Play client-side bullet ricochet/ping sounds on metal and hard block impacts.
	enableRicochetSounds = true
	#Chance that a metal impact plays a ricochet sound.
	# Default: 0.7
	# Range: 0.0 ~ 1.0
	ricochetSoundChanceMetal = 0.7
	#Chance that a hard stone/concrete impact plays a dull ricochet/chip sound.
	# Default: 0.25
	# Range: 0.0 ~ 1.0
	ricochetSoundChanceHardBlock = 0.25
	#Base ricochet sound volume.
	# Default: 0.8
	# Range: 0.0 ~ 4.0
	ricochetVolume = 0.8
	#Client-side limiter for ricochet sounds to avoid automatic fire spam.
	# Default: 12
	# Range: 0 ~ 128
	ricochetMaxSoundsPerSecond = 12
	#Maximum distance in blocks at which ricochet sounds can play.
	# Default: 48.0
	# Range: 1.0 ~ 256.0
	ricochetMaxDistance = 48.0

[muzzle_smoke]
	#Spawn client-side muzzle smoke when TaCZ guns fire.
	enableMuzzleSmoke = true
	#Base muzzle smoke particles per shot. Campfire smoke is dense, so defaults are intentionally low.
	# Default: 2
	# Range: 0 ~ 64
	muzzleSmokeAmount = 2
	#Base muzzle smoke lifetime in client ticks.
	# Default: 10
	# Range: 1 ~ 100
	muzzleSmokeLifetimeTicks = 10
	#Base visual scale for muzzle smoke particles.
	# Default: 0.22
	# Range: 0.05 ~ 2.0
	muzzleSmokeScale = 0.22
	#Increase smoke density during sustained automatic fire.
	dynamicSmokeBuildup = true
	#Client-side limiter for muzzle smoke particles.
	# Default: 45
	# Range: 0 ~ 2000
	maxSmokeParticlesPerSecond = 45

[indoor_smoke]
	#Accumulate longer-lived client-side tactical smoke in enclosed indoor spaces during gunfights.
	enableIndoorSmoke = true
	#Multiplier for smoke density gained in enclosed indoor spaces.
	# Default: 2.5
	# Range: 0.0 ~ 10.0
	indoorSmokeMultiplier = 2.5
	#Indoor smoke dissipation speed. Lower values linger longer.
	# Default: 0.25
	# Range: 0.01 ~ 5.0
	smokeDissipationSpeedIndoor = 0.25
	#Outdoor smoke dissipation speed. Higher values clears smoke faster.
	# Default: 1.0
	# Range: 0.01 ~ 5.0
	smokeDissipationSpeedOutdoor = 1.0
	#Maximum tracked indoor smoke density per local room cell.
	# Default: 1.0
	# Range: 0.05 ~ 4.0
	maxIndoorSmokeDensity = 1.0
	#Allow tactical light flashes and flashlight-like beams to brighten nearby smoke haze.
	enableFlashlightSmokeInteraction = true
	#Allow laser/beam-like light hints to become more visible inside smoke haze.
	enableLaserSmokeVisibility = true

[glass_shards]
	#Spawn temporary client-side glass shard debris when bullets hit or break glass.
	enableGlassShards = true
	#Base glass shard debris count for full glass blocks. Panes spawn fewer shards.
	# Default: 12
	# Range: 0 ~ 128
	glassShardAmount = 12
	#How long glass shard debris remains visible on clients.
	# Default: 20
	# Range: 1 ~ 300
	glassShardLifetimeSeconds = 20
	#Fade glass shard debris before removing it.
	glassShardFadeOut = true
	#Maximum client-side glass shard debris stored per chunk. Oldest shards are removed first.
	# Default: 80
	# Range: 0 ~ 1000
	maxGlassShardsPerChunk = 80

[suppression]
	#Deprecated and ignored. Projectile proximity sounds have been removed; distant gunshots are handled by the distant_gunshots section.
	enableSuppressionSounds = false
	#Deprecated and ignored.
	# Default: 3.0
	# Range: 0.25 ~ 16.0
	suppressionRadius = 3.0
	#Deprecated and ignored.
	# Default: 1.0
	# Range: 0.0 ~ 4.0
	suppressionVolume = 1.0
	#Deprecated and ignored.
	# Default: 10
	# Range: 0 ~ 128
	suppressionMaxSoundsPerSecond = 10
	#Deprecated and ignored.
	enableShooterSuppression = false

[dynamic_lighting]
	#Render short-lived client-side tactical light flashes from gunfire and breaching impacts.
	enableDynamicGunLighting = true
	#Render tiny short-lived light flashes from metal ricochet sparks.
	enableSparkLighting = true
	#Base visual intensity for muzzle flash lighting.
	# Default: 1.0
	# Range: 0.0 ~ 8.0
	muzzleFlashLightIntensity = 1.0
	#Base visual intensity for spark light flashes.
	# Default: 0.4
	# Range: 0.0 ~ 8.0
	sparkLightIntensity = 0.4
	#Maximum visual range in blocks for tactical dynamic light flashes.
	# Default: 7
	# Range: 1 ~ 32
	dynamicLightRange = 7
	#Reduce muzzle flash lighting for suppressed weapons.
	reducedLightingForSuppressors = true

[screen_dust]
	#Show subtle client-side screen edge dust/debris when bullets impact close to the player.
	enableScreenDust = true
	#Impact distance in blocks that can trigger screen dust.
	# Default: 5.0
	# Range: 0.5 ~ 24.0
	screenDustRadius = 5.0
	#Base screen dust opacity/intensity.
	# Default: 0.45
	# Range: 0.0 ~ 2.0
	screenDustIntensity = 0.45
	#Screen dust overlay duration in client ticks.
	# Default: 18
	# Range: 1 ~ 100
	screenDustDurationTicks = 18
	#Client-side limiter for nearby screen dust triggers.
	# Default: 4
	# Range: 0 ~ 64
	screenDustMaxTriggersPerSecond = 4
	#Multiplier for screen dust intensity indoors/enclosed spaces.
	# Default: 1.5
	# Range: 0.0 ~ 6.0
	screenDustIndoorMultiplier = 1.5

[weapon_heat]
	#Track client-side weapon heat from sustained TaCZ fire.
	enableWeaponHeat = true
	#Spawn smoke from hot barrels after sustained fire.
	enableBarrelSmoke = true
	#Spawn subtle heat shimmer/haze particles above hot barrels.
	enableHeatDistortion = true
	#Spawn subtle orange/red glow particles and light from extremely hot barrels/suppressors.
	enableHotBarrelGlow = true
	#Multiplier for weapon heat cooling speed. Higher values cool faster.
	# Default: 1.0
	# Range: 0.05 ~ 10.0
	weaponCoolingSpeed = 1.0
	#Maximum tracked weapon heat level.
	# Default: 100
	# Range: 10 ~ 1000
	maxHeatLevel = 100
	#Visual strength for heat shimmer particles.
	# Default: 0.35
	# Range: 0.0 ~ 4.0
	heatDistortionStrength = 0.35
	#Visual intensity for hot barrel/suppressor glow.
	# Default: 0.5
	# Range: 0.0 ~ 4.0
	barrelGlowIntensity = 0.5

[material_penetration]
	#Allow TaCZ bullets to penetrate supported materials with damage and velocity loss.
	enableMaterialPenetration = true
	#Maximum block thickness in blocks that the penetration solver checks.
	# Default: 3.0
	# Range: 0.1 ~ 16.0
	maxPenetrationDepth = 3.0
	#Penetration capability multiplier for wood-like blocks.
	# Default: 1.0
	# Range: 0.0 ~ 10.0
	woodPenetrationMultiplier = 1.0
	#Penetration capability multiplier for stone/concrete/brick-like blocks.
	# Default: 0.55
	# Range: 0.0 ~ 10.0
	stonePenetrationMultiplier = 0.55
	#Penetration capability multiplier for metal blocks.
	# Default: 0.25
	# Range: 0.0 ~ 10.0
	metalPenetrationMultiplier = 0.25
	#Penetration capability multiplier for reinforced/blast-resistant blocks.
	# Default: 0.05
	# Range: 0.0 ~ 10.0
	reinforcedPenetrationMultiplier = 0.05
	#Damage multiplier loss per block penetrated.
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	damageLossPerBlock = 0.35
	#Velocity multiplier loss per block penetrated.
	# Default: 0.3
	# Range: 0.0 ~ 1.0
	velocityLossPerBlock = 0.3
	#Spawn client-side exit decals when bullets penetrate blocks.
	enableExitDecals = true
	#Spawn client-side entry/exit particles for bullet penetration.
	enablePenetrationParticles = true

[camera_shake]
	#Enable subtle client-side cinematic camera shake. Accessibility: set false to disable all shake.
	enableCameraShake = true
	#Global camera shake intensity multiplier.
	# Default: 1.0
	# Range: 0.0 ~ 4.0
	cameraShakeIntensity = 1.0
	#Maximum distance in blocks for camera shake events.
	# Default: 18
	# Range: 1 ~ 96
	cameraShakeMaxDistance = 18
	#Base duration in ticks for camera shake events.
	# Default: 8
	# Range: 1 ~ 80
	cameraShakeDurationTicks = 8
	#Enable stronger rumble shake from nearby explosions.
	enableExplosionShake = true
	#Enable short punchy shake from shotgun/heavy nearby fire.
	enableShotgunShake = true
	#Enable sharp jolt shake from configured pressure events.
	enableSuppressionShake = true
	#Enable short impact shake from door/block breaching and destruction.
	enableBreachingShake = true

[armor_hits]
	#Enable client-side sparks, smoke, metal debris, and sounds when TaCZ bullets hit armor.
	enableArmorHitEffects = true
	#Allow weak bullet hits on armor to visually ricochet and reduce damage.
	enableArmorRicochet = true
	#Spawn bright metal sparks when TaCZ bullets hit armor.
	enableArmorSparks = true
	#Base chance for non-AP bullet hits on armor to ricochet or deflect. High caliber and AP rounds reduce this chance.
	# Default: 0.45
	# Range: 0.0 ~ 1.0
	armorRicochetChance = 0.45
	#Spark particles per armored entity or vehicle hit.
	# Default: 8
	# Range: 0 ~ 64
	armorSparkAmount = 8
	#Base volume for armor hit, thud, and ricochet sounds.
	# Default: 0.9
	# Range: 0.0 ~ 4.0
	armorHitVolume = 0.9

[blood_effects]
	#Spawn subtle client-side blood mist when TaCZ bullets hit living entities.
	enableBloodMist = true
	#Render small fading client-side blood splatter decals on nearby surfaces behind hit targets.
	enableWallSplatter = true
	#Global intensity multiplier for subtle blood mist. Keep low for restrained tactical visuals.
	# Default: 0.35
	# Range: 0.0 ~ 2.0
	bloodMistIntensity = 0.35
	#Chance that a living entity bullet hit creates a small wall/floor splatter behind the target.
	# Default: 0.25
	# Range: 0.0 ~ 1.0
	bloodSplatterChance = 0.25
	#How long blood splatter decals remain visible on clients, in seconds.
	# Default: 180
	# Range: 1 ~ 1800
	bloodDecalLifetimeSeconds = 180
	#Maximum client-side blood splatter decals stored per chunk. Oldest decals are removed first.
	# Default: 40
	# Range: 0 ~ 500
	maxBloodDecalsPerChunk = 40

[dynamic_impact_sounds]
	#Enable context-aware client-side bullet impact sounds for material, distance, caliber, and indoor/outdoor space.
	enableDynamicImpactSounds = true
	#Add short local echo/reverb layers for impacts in enclosed indoor spaces.
	enableIndoorReverb = true
	#Lower volume and pitch for distant impacts to simulate muffling.
	enableDistanceMuffling = true
	#Maximum distance in blocks for dynamic impact sounds.
	# Default: 96
	# Range: 4 ~ 256
	impactSoundMaxDistance = 96
	#Global dynamic impact sound volume multiplier.
	# Default: 1.0
	# Range: 0.0 ~ 4.0
	impactSoundVolume = 1.0
	#Randomize impact sound variants, pitch, volume, and rare cinematic ricochet cracks.
	dynamicImpactVariation = true

[gunshot_acoustics]
	#Play client-side bullet crack echoes and environmental gunshot acoustic tails for TaCZ shots.
	enableBulletCrackEcho = true
	#Allow outdoor echo tails in open, urban, valley, and forest environments.
	enableOutdoorEcho = true
	#Echo intensity multiplier for dense urban/building areas.
	# Default: 1.0
	# Range: 0.0 ~ 5.0
	urbanEchoIntensity = 1.0
	#Reverb intensity multiplier for indoor gunshots and sniper cracks.
	# Default: 1.2
	# Range: 0.0 ~ 5.0
	indoorReverbIntensity = 1.2
	#Echo intensity multiplier for open valley/mountain-like terrain.
	# Default: 1.4
	# Range: 0.0 ~ 5.0
	valleyEchoIntensity = 1.4
	#Multiplier applied to outdoor echoes in forests to dampen high-frequency crack tails.
	# Default: 0.65
	# Range: 0.0 ~ 1.0
	forestEchoReduction = 0.65
	#Maximum distance in blocks for client-side environmental gunshot echoes.
	# Default: 256
	# Range: 16 ~ 512
	maxEchoDistance = 256

[suppression_effects]
	#Render a very subtle edge-only pressure vignette/blur hint for explosions and sustained nearby fire. Accessibility: set false to disable visual blur.
	enableSuppressionBlur = true
	#Play short fading tinnitus/ringing after heavy suppression, sniper cracks, or nearby explosions.
	enableSuppressionRinging = true
	#Enable subtle desaturation tint and pressure feel while under heavy fire.
	enableStressEffects = true
	#Maximum visual strength for subtle edge suppression blur. Center screen remains clear.
	# Default: 0.18
	# Range: 0.0 ~ 1.0
	suppressionBlurStrength = 0.18
	#Radius in blocks for suppression visual/stress effects around the player.
	# Default: 4.0
	# Range: 0.5 ~ 16.0
	suppressionEffectRadius = 4.0
	#Base duration in ticks for ear ringing after heavy suppression events.
	# Default: 40
	# Range: 1 ~ 200
	earRingingDurationTicks = 40
	#Client-side limiter for suppression visual/ringing triggers.
	# Default: 6
	# Range: 0 ~ 64
	maxSuppressionEffectsPerSecond = 6

[physical_debris]
	#Spawn short-lived client-side physical debris when doors, glass, and destructible blocks are destroyed.
	enablePhysicalDebris = true
	#How long physical debris remains visible before fading/despawning.
	# Default: 25
	# Range: 1 ~ 180
	debrisLifetimeSeconds = 25
	#Maximum physical debris pieces stored per chunk. Oldest debris is removed first.
	# Default: 120
	# Range: 0 ~ 1000
	maxDebrisPerChunk = 120
	#Base plank/chunk debris amount for destroyed wooden blocks and doors.
	# Default: 14
	# Range: 0 ~ 160
	woodDebrisAmount = 14
	#Base glass chunk debris amount for destroyed glass blocks and panes.
	# Default: 18
	# Range: 0 ~ 160
	glassDebrisAmount = 18
	#Base bent metal fragment amount for destroyed metallic blocks.
	# Default: 10
	# Range: 0 ~ 160
	metalDebrisAmount = 10
	#Base rubble fragment amount for destroyed stone/concrete blocks.
	# Default: 16
	# Range: 0 ~ 160
	concreteDebrisAmount = 16

[shockwave_dust]
	#Spawn client-side shockwave dust, haze, and drifting debris after indoor explosions and heavy breaching detonations.
	enableShockwaveDust = true
	#Apply brief client-side pressure feedback near indoor explosions.
	enableIndoorPressureEffect = true
	#Spawn short falling dust/debris from ceilings and nearby surfaces after explosions.
	enableDebrisFalloff = true
	#Global intensity multiplier for explosion shockwave dust.
	# Default: 1.0
	# Range: 0.0 ~ 5.0
	shockwaveDustIntensity = 1.0
	#Strength multiplier for indoor pressure wave camera/audio visual feedback.
	# Default: 0.45
	# Range: 0.0 ~ 2.0
	pressureEffectStrength = 0.45
	#Lifetime for shockwave dust and falling ceiling dust particles.
	# Default: 80
	# Range: 4 ~ 300
	dustLifetimeTicks = 80
	#Client-side particle budget per second for shockwave dust and debris falloff.
	# Default: 180
	# Range: 0 ~ 2000
	maxShockwaveParticles = 180

[burn_marks]
	#Render client-side burn/scorch decals from explosions, breaching, and heavy heat residue.
	enableBurnMarks = true
	#Create large dark scorch marks after explosions.
	enableExplosionScorch = true
	#Create scorch residue around breached doors, frames, locks, and destroyed blocks.
	enableBreachScorch = true
	#Allow sustained heavy fire, hot barrels, and muzzle blasts to lightly darken nearby surfaces.
	enableHeatResidue = true
	#How long burn/scorch decals remain visible on clients, in seconds.
	# Default: 600
	# Range: 5 ~ 7200
	burnMarkLifetimeSeconds = 600
	#Maximum client-side burn marks stored per chunk. Oldest scorch marks are removed first.
	# Default: 60
	# Range: 0 ~ 500
	maxBurnMarksPerChunk = 60
	#Global opacity multiplier for scorch decals.
	# Default: 0.65
	# Range: 0.0 ~ 1.0
	burnMarkOpacity = 0.65

[nightstick_flashlight]
	#Upgrade the TaCZ Nightstick Compact Laser attachment into a client-side tactical flashlight and laser/light combo.
	enableNightstickFlashlight = true
	#Visual intensity multiplier for the Nightstick tactical flashlight beam.
	# Default: 1.0
	# Range: 0.0 ~ 5.0
	flashlightIntensity = 1.0
	#Maximum range in blocks for the Nightstick tactical flashlight beam.
	# Default: 18
	# Range: 2 ~ 64
	flashlightRange = 18
	#Allow the Nightstick flashlight to feed TaCZ Tactical Breaching's client-side dynamic lighting and smoke illumination.
	enableDynamicLighting = true

[frag_grenade]
	#Enable the TaCZ Tactical Breaching throwable frag grenade item and entity.
	enableFragGrenade = true
	#Cooldown after throwing a frag grenade, in ticks. 20 ticks = 1 second.
	# Default: 40
	# Range: 0 ~ 1200
	fragGrenadeCooldownTicks = 40
	#Fuse time for thrown frag grenades in ticks. 20 ticks = 1 second.
	# Default: 60
	# Range: 5 ~ 400
	fragFuseTimeTicks = 60
	#Visual and damage radius for frag grenade explosions, in blocks. Code enforces at least 12 blocks for frag grenades.
	# Default: 12.0
	# Range: 1.0 ~ 24.0
	fragExplosionRadius = 12.0
	#Base fragmentation damage before distance falloff and armor mitigation. Code enforces at least 80 when enabled.
	# Default: 80.0
	# Range: 0.0 ~ 200.0
	fragDamage = 80.0
	#Number of invisible fragment rays checked when the grenade detonates. Code enforces at least 256 when enabled.
	# Default: 256
	# Range: 0 ~ 512
	fragCount = 256
	#When true, blocks between fragments and targets block or reduce fragment hits.
	enableFragmentLineOfSight = true
	#Allow frag grenade explosions to damage/break vanilla blocks. Disabled by default for tactical balance.
	enableBlockDamage = false
	#Spawn client-side smoke and lingering haze from frag detonations.
	enableFragSmoke = true
	#Spawn client-side debris, dust, sparks, and fragments from frag detonations.
	enableFragDebris = true
	#Enable stronger indoor pressure/shockwave feedback for frag detonations.
	enableIndoorPressure = true
	#Allow ceiling dust/falling debris after indoor frag detonations.
	enableCeilingDust = true
	#Enable ear ringing/tinnitus after close frag detonations.
	enableEarRinging = true
	#Maximum client distance in blocks for layered frag explosion audio.
	# Default: 256
	# Range: 16 ~ 512
	fragExplosionSoundDistance = 256
	#Enable distant rolling boom tails for frag explosions.
	enableExplosionEcho = true
	#Enable close indoor reverb layers for frag explosions.
	enableIndoorExplosionReverb = true

[flashbang]
	#Enable the TaCZ Tactical Breaching throwable tactical flashbang item and entity.
	enableFlashbang = true
	#Cooldown after throwing a flashbang grenade, in ticks. 20 ticks = 1 second.
	# Default: 40
	# Range: 0 ~ 1200
	flashbangCooldownTicks = 40
	#Fuse time for thrown flashbang grenades in ticks. 20 ticks = 1 second.
	# Default: 40
	# Range: 5 ~ 400
	flashbangFuseTicks = 40
	#Radius in blocks for flash, tinnitus, blur, and pressure effects.
	# Default: 12.0
	# Range: 1.0 ~ 48.0
	flashbangRadius = 12.0
	#Duration of the white flash visual effect in ticks.
	# Default: 60
	# Range: 1 ~ 240
	flashDurationTicks = 60
	#Duration of close flashbang tinnitus/ringing in ticks.
	# Default: 100
	# Range: 1 ~ 400
	tinnitusDurationTicks = 100
	#Maximum subtle blur/vignette strength caused by flashbangs.
	# Default: 0.25
	# Range: 0.0 ~ 1.0
	blurStrength = 0.25
	#When true, solid walls block flashbang blinding effects. Glass reduces the effect instead of fully blocking it.
	enableLineOfSightCheck = true
	#Enable stronger indoor flashbang detonation reverb and pressure feeling.
	enableIndoorReverb = true

[gas_masks]
	#Enable gas mask items, filter protection, overlay, and filter durability.
	enableGasMasks = true
	#Drain installed gas mask filters over time while the mask is worn.
	enableFilterDurability = true
	#Play quiet breathing sounds while wearing a working gas mask.
	enableBreathingSounds = true
	#Reduce flashbang intensity and duration while wearing a working gas mask.
	enableFlashbangProtection = true
	#Reduce indoor smoke visual impairment while wearing a working gas mask.
	enableSmokeProtection = true
	#Render the client-side gas mask vignette overlay while wearing the gas mask.
	gasMaskOverlayEnabled = true
	#Opacity multiplier for the gas mask overlay.
	# Default: 0.34
	# Range: 0.0 ~ 1.0
	gasMaskOverlayOpacity = 0.34
	#Scale of the bottom-left gas mask filter HUD text.
	# Default: 0.6
	# Range: 0.35 ~ 1.5
	gasMaskFilterTextScale = 0.6
	#Show the current gas mask filter percentage on the HUD.
	gasMaskFilterTextEnabled = true

[handcuffs]
	#Enable the multiplayer-safe handcuffs restraint system.
	handcuffsEnabled = true
	#Allow players to restrain other players with handcuffs.
	allowHandcuffPlayers = true
	#Allow players to restrain villagers with handcuffs.
	allowHandcuffVillagers = true
	#Movement speed multiplier applied to restrained players.
	# Default: 0.2
	# Range: 0.0 ~ 1.0
	restrainedSpeedMultiplier = 0.2
	#Block restrained players from using inventories and item interactions.
	blockInventoryInteraction = true
	#Block restrained players from opening chests and container blocks.
	blockChestInteraction = true
	#Block restrained players from using doors, buttons, levers, trapdoors, gates, and similar controls.
	blockDoorInteraction = true
	#Require a Handcuff Key item to release restrained players or villagers.
	requireKeyToUnlock = true
	#Allow operators to force unlock restrained entities without a key.
	operatorsCanForceUnlock = true

[distant_gunshots]
	#Enable event-driven distant TaCZ gunshot audio beyond normal Minecraft sound range.
	enableDistantGunshots = true
	#Distance in blocks where normal TaCZ gun sounds are used and no extra distant sound packet is sent.
	# Default: 300
	# Range: 0 ~ 10000
	normalRange = 300
	#Minimum shooter-to-listener distance in blocks before sending packet-based distant gunshot audio. Keep this equal to normalRange for normal gameplay.
	# Default: 300
	# Range: 0 ~ 10000
	minDistantGunshotDistance = 300
	#Distance in blocks for quieter nearby distant gunshot pops.
	# Default: 1000
	# Range: 32 ~ 12000
	distantRange = 1000
	#Distance in blocks for dedicated far pop sounds with small randomized delay.
	# Default: 3000
	# Range: 64 ~ 16000
	farRange = 3000
	#Distance in blocks for very distant echo sounds with heavier delay and skip chance.
	# Default: 7000
	# Range: 128 ~ 32000
	extremeRange = 7000
	#Maximum shooter-to-listener distance in blocks for packet-based distant gunshot audio.
	# Default: 7000
	# Range: 128 ~ 32000
	maxDistantGunshotDistance = 7000
	#Global volume multiplier for all distant gunshot sounds.
	# Default: 1.0
	# Range: 0.0 ~ 4.0
	distantGunshotVolume = 1.0
	#Delay distant gunshot playback by distance / 343.0 to simulate speed of sound.
	enableSoundDelay = true
	#Multiplier applied to maximum distant gunshot range and volume for suppressed weapons.
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	suppressorDistanceMultiplier = 0.35
	#Track shot bursts per chunk so far players can hear occasional active firefight bursts.
	enableBattleDetection = true
	#Shots in the battle window needed to mark a chunk as an active firefight.
	# Default: 10
	# Range: 1 ~ 200
	battleThresholdShots = 10
	#Time window in seconds for active firefight detection.
	# Default: 5
	# Range: 1 ~ 60
	battleWindowSeconds = 5
	#Volume multiplier for 300-1000 block distant gunshots.
	# Default: 0.5
	# Range: 0.0 ~ 4.0
	distantVolumeMultiplier = 0.5
	#Volume multiplier for 1000-3000 block distant gunshots.
	# Default: 0.25
	# Range: 0.0 ~ 4.0
	farVolumeMultiplier = 0.25
	#Volume multiplier for 3000-7000 block distant echoes.
	# Default: 0.1
	# Range: 0.0 ~ 4.0
	extremeVolumeMultiplier = 0.1
	#Enable randomized delays, occasional skip chance, and battle burst variation.
	enableRandomEchoes = true
	#Maximum distant gunshot sounds sent/played per player per second. Higher values let automatic fire overlap more naturally at range.
	# Default: 18
	# Range: 0 ~ 64
	maxSoundsPerSecond = 18
	#Compatibility flag only. Must remain false: distant gunshots never fall back to Minecraft vanilla sounds.
	useVanillaSoundsFallback = false
	#Log distant gunshot dispatch details for troubleshooting. Can also be toggled with /taczbreach distantgunshots debug.
	debugDistantGunshots = true
